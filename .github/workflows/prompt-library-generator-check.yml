name: Check prompt-library generator

on:
  pull_request:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

jobs:
  prompt-library-generator:
    name: Validate generated prompt-library outputs
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Run generator health report
        run: python scripts/generator_health_report.py --fail-on-problems

      - name: Run prompt-library generator CI checks
        run: python scripts/build_prompt_libraries.py --ci

      - name: Run audit/testing pack generator CI checks
        run: python scripts/build_audit_pack.py --ci

      - name: Check generated site data
        run: python scripts/build_site_data.py --check

      - name: Run release consistency check
        run: python scripts/release_consistency_check.py --fail-on-problems
